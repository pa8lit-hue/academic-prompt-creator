<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic PDF Analyzer AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --text: #1e293b;
        }
        body {
            font-family: 'Sarabun', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; color: var(--primary); }
        .section {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input[type="text"], input[type="password"], select {
            width: 100%; padding: 10px; margin-bottom: 10px;
            border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box;
        }
        input[type="file"] { margin-bottom: 10px; }
        button {
            background-color: var(--primary); color: white;
            border: none; padding: 12px 20px; border-radius: 6px;
            cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s;
        }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        #outputArea {
            white-space: pre-wrap; background: #f1f5f9; padding: 20px;
            border-radius: 8px; font-size: 14px; margin-top: 15px; display: none;
        }
        .status { color: #059669; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Academic PDF Analyzer</h1>
    <p style="text-align: center;">วิเคราะห์บทความวิชาการจากไฟล์ PDF ด้วย AI (ข้อมูลไม่รั่วไหล)</p>

    <div class="section">
        <label>⚙️ 1. ใส่ Gemini API Key ของคุณ</label>
        <input type="password" id="apiKey" placeholder="AIzaSy... (API Key จะถูกเก็บไว้ในเบราว์เซอร์ของคุณเท่านั้น)">
        <p style="font-size: 12px; color: #64748b;">รับ Key ฟรีได้ที่ Google AI Studio</p>
    </div>

    <div class="section">
        <label>📄 2. อัปโหลดไฟล์ PDF งานวิจัย (แนะนำ 1-5 ไฟล์เพื่อความรวดเร็ว)</label>
        <input type="file" id="pdfFiles" multiple accept="application/pdf">
        
        <label style="margin-top: 15px;">🎯 3. เลือกรูปแบบการวิเคราะห์</label>
        <select id="taskType">
            <option value="synthesis">สร้างตารางเปรียบเทียบวรรณกรรม (Synthesis Matrix)</option>
            <option value="gap">หาช่องว่างการวิจัย (Identify Research Gaps)</option>
            <option value="methodology">สรุประเบียบวิธีวิจัยและข้อจำกัด (Methodology & Limitations)</option>
        </select>

        <label style="margin-top: 15px;">🔍 4. คีย์เวิร์ดที่ต้องการเน้นเป็นพิเศษ (ไม่บังคับ)</label>
        <input type="text" id="keywords" placeholder="เช่น นโยบาย ESG, AI in Education, ผู้สูงอายุ">
    </div>

    <button id="analyzeBtn" onclick="processPDFs()">🚀 เริ่มวิเคราะห์เอกสาร</button>
    <div id="statusText" class="status"></div>
    
    <div id="outputArea"></div>
</div>

<script>
    // ตั้งค่า Worker ของ PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // ฟังก์ชันดึงข้อความจาก PDF ทีละไฟล์
    async function extractTextFromPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = `\n\n--- เริ่มเอกสาร: ${file.name} ---\n`;
        
        // ดึงข้อความจากทุกหน้า (ดึงแค่ 10 หน้าแรกต่อไฟล์ เพื่อป้องกัน Token ล้น)
        const maxPages = Math.min(pdf.numPages, 10); 
        for (let i = 1; i <= maxPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(' ');
            fullText += pageText + "\n";
        }
        return fullText;
    }

    // ฟังก์ชันหลักเมื่อกดปุ่ม "เริ่มวิเคราะห์"
    async function processPDFs() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const files = document.getElementById('pdfFiles').files;
        const taskType = document.getElementById('taskType').value;
        const keywords = document.getElementById('keywords').value.trim();
        const statusText = document.getElementById('statusText');
        const outputArea = document.getElementById('outputArea');
        const analyzeBtn = document.getElementById('analyzeBtn');

        if (!apiKey) { alert("กรุณาใส่ API Key ก่อนครับ"); return; }
        if (files.length === 0) { alert("กรุณาอัปโหลดไฟล์ PDF อย่างน้อย 1 ไฟล์ครับ"); return; }

        try {
            analyzeBtn.disabled = true;
            outputArea.style.display = 'none';
            statusText.innerText = "กำลังสกัดข้อความจาก PDF... (อาจใช้เวลาสักครู่)";

            // 1. อ่านไฟล์ PDF ทั้งหมด
            let combinedText = "";
            for (let i = 0; i < files.length; i++) {
                statusText.innerText = `กำลังสกัดข้อความไฟล์ที่ ${i+1}/${files.length}...`;
                combinedText += await extractTextFromPDF(files[i]);
            }

            // 2. สร้าง Prompt ทรงพลัง (Grounding Prompt)
            statusText.innerText = "กำลังวิเคราะห์ข้อมูลด้วย AI...";
            const prompt = `
[Role]: คุณคือผู้ช่วยวิจัยระดับสูง 
[Task]: หน้าที่ของคุณคือ ${document.getElementById('taskType').options[document.getElementById('taskType').selectedIndex].text}
[Focus]: โปรดเน้นประเด็นที่เกี่ยวกับ "${keywords ? keywords : 'เนื้อหาหลักของเอกสาร'}"

[Strict Rules - กฎเหล็ก]:
1. ห้ามใช้ข้อมูลภายนอกเด็ดขาด ให้อ้างอิงเฉพาะข้อมูลที่อยู่ในเอกสารที่แนบมานี้เท่านั้น
2. หากข้อมูลใดไม่มีในเอกสาร ให้ตอบว่า "ไม่พบข้อมูล"
3. ต้องมีการอ้างอิงชื่อไฟล์ (เช่น [ชื่อไฟล์.pdf]) ทุกครั้งที่นำข้อมูลมาสรุป
4. ใช้ภาษาทางการแบบวิชาการ (Academic Tone)

[Raw Data เอกสารแนบ]:
${combinedText}
            `;

            // 3. ส่งข้อมูลไปที่ Gemini API (ใช้รุ่น 1.5 Flash ที่อ่าน Context ได้ยาวและเร็ว)
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const result = await response.json();
            
            // 4. แสดงผลลัพธ์
            if (result.candidates && result.candidates[0].content.parts[0].text) {
                statusText.innerText = "✅ วิเคราะห์เสร็จสิ้น!";
                outputArea.style.display = 'block';
                outputArea.innerText = result.candidates[0].content.parts[0].text;
            } else {
                throw new Error("AI ไม่ส่งคำตอบกลับมา (อาจจะ Context ยาวเกินไป หรือ API Key ผิด)");
            }

        } catch (error) {
            console.error(error);
            statusText.innerText = "❌ เกิดข้อผิดพลาด: " + error.message;
        } finally {
            analyzeBtn.disabled = false;
        }
    }
</script>

</body>
</html>
